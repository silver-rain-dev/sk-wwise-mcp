name: Build and release

# Triggers:
#   - push to a tag like v0.1.0 -> build + create GitHub release with the zip
#   - manual dispatch         -> build + upload as workflow artifact (no release)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write  # needed to create releases

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build bundle
        shell: pwsh
        run: .\build.ps1

      # Code signing intentionally not wired up — releases ship unsigned and
      # users see a one-time Windows SmartScreen warning ("More info → Run
      # anyway"). This is documented in release/README.md.
      #
      # If SmartScreen friction becomes a real issue, two practical paths:
      #   - SignPath.io free OSS tier (1-2 wk approval, then add their action
      #     here using a SIGNPATH_API_TOKEN secret).
      #   - Azure Trusted Signing (~$10/mo, needs verified Entra identity,
      #     uses azure/trusted-signing-action).
      # Both insert a step between this build and the release upload below.

      - name: Smoke test
        shell: pwsh
        run: |
          .\dist\sk-wwise-mcp\sk-wwise-mcp.exe --help
          if ($LASTEXITCODE -ne 0) { throw "smoke test failed" }

      # Manual / non-tag runs: keep zip as artifact for inspection.
      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sk-wwise-mcp-${{ github.sha }}
          path: dist/sk-wwise-mcp.zip
          if-no-files-found: error

      # Tag pushes: publish a GitHub release with the zip attached.
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sk-wwise-mcp.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
